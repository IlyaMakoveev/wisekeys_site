<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WiseKeys VPN | Твоя Свобода</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="./logo.svg">
  <link rel="stylesheet" href="./style.css">
<link rel="stylesheet" href="/index.css">
</head>
<body>

  <div class="bg-rings">
    <div class="ring ring-1"></div>
    <div class="ring ring-2"></div>
    <div class="ring ring-3"></div>
    <div class="ring ring-4"></div>
  </div>
  
  <div class="container">
    <div class="shield-container">
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
      </svg>
    </div>

    <section id="view-landing" class="view-animation">
      <div class="hero">
        <h1>WiseKeys VPN<br><span style="color: var(--primary-blue)">Твоя Свобода</span></h1>
        <p>Кристально чистый интернет. Премиальная скорость, полная анонимность и доступ ко всем ресурсам в один клик.</p>
        <div style="display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 320px; margin: 0 auto;">
          <a href="./auth.html" class="btn-blue" style="justify-content: center;">Подключить VPN</a>
          <button class="btn-outline" style="justify-content: center;" onclick="scrollToId('view-proxy')">Телеграм Прокси</button>
        </div>
      </div>

      <div id="view-proxy" class="card">
        <div class="card-header" style="margin-bottom: 20px;">
          <div>
            <h3 class="brand-title" style="font-size: 24px;">Telegram Proxy</h3>
            <div class="brand-status">Используйте прокси для обхода блокировок</div>
          </div>
        </div>
        
        <div class="proxy-config-box">
          <span id="proxy-link" class="proxy-config-text">t.me/proxy?server=wisekeys.io&port=443&secret=...</span>
          <div class="copy-icon" onclick="copyText('proxy-link')">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          </div>
        </div>
        
        <button class="btn-blue" style="margin-bottom: 0;" onclick="window.open('https://t.me/proxy?server=1.1.1.1&port=443&secret=7gAAAAAAAAAAAAAAAAAAAABnb29nbGUuY29t')">
          Подключить в Telegram
        </button>
      </div>
    </section>
  </div>

  <nav class="nav-floating">
    <div class="nav-bar">
      <a href="./index.html" class="nav-btn active" id="nav-home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <span class="nav-text">Главная</span>
      </a>
      <a href="./dashboard.html" class="nav-btn" id="nav-profile">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        <span class="nav-text hidden">Кабинет</span>
      </a>
    </div>
  </nav>

  <div id="toast" class="toast">Скопировано успешно!</div>

  <script src="./index.js"></script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
